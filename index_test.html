<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Secretary - Add Appointment</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, textarea, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 8px;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>เพิ่มนัดหมาย</h2>

<form id="appointmentForm">
  <input type="text" id="title" placeholder="ชื่อนัด" required />

  <input type="date" id="event_date" required />

  <input type="time" id="event_time" required />

  <input type="number" id="remind_before_days" placeholder="เตือนล่วงหน้ากี่วัน" value="0" min="0" />

  <textarea id="note" placeholder="หมายเหตุเพิ่มเติม"></textarea>

  <button type="submit">บันทึกนัดtestV1.4.62</button>
</form>

<script>
  const liffId = "2008859812-P8rNW4Tb"; // ใช้ของคุณ
  let profile = null;
  const params = new URLSearchParams(window.location.search);
  const mode = params.get("mode");
  const id = params.get("id");
  async function main() {
    await liff.init({ liffId });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const profile = await liff.getProfile();
    const userId = profile.userId;
    console.log("mode:", mode);
    console.log("id:", id);
    if (mode === "edit" && id) {
      await loadAppointment(id, profile.userId);
    }
  }
  async function loadAppointment(id, userId) {
    const res = await fetch(`https://poonyameenoi.app.n8n.cloud/webhook-test/get-appointment-for-edit?id=${id}&userId=${userId}`);
    const data = await res.json();
    const appt = data[0];
    console.log(appt);
    console.log(data);
    if (!data.allowed) {
      alert("ลิงก์แก้ไขหมดอายุ หรือไม่สามารถใช้งานได้");

      document.getElementById("appointmentForm").style.display = "none";

      return;
    }

    const appt = data.appointment;

    document.getElementById("title").value = appt.title;
    document.getElementById("event_date").value = appt.event_date.split("T")[0];
    document.getElementById("event_time").value = appt.event_time.slice(0, 5);
    document.getElementById("remind_before_days").value = appt.remind_before_days;
    document.getElementById("note").value = appt.note || "";
  }  
  async function submitForm(event) {
    event.preventDefault();

    
   
    const payload = {
      action: mode === "edit" ? "edit_appointment" : "add_appointment",
      id: id,
      userId: profile.userId,
      displayName: profile.displayName,
      title: document.getElementById("title").value,
      event_date: document.getElementById("event_date").value,
      event_time: document.getElementById("event_time").value,
      remind_before_days: parseInt(document.getElementById("remind_before_days").value) || 0,
      note: document.getElementById("note").value,
      tags: []  // เตรียมไว้ future
    };

    await fetch("https://poonyameenoi.app.n8n.cloud/webhook-test/receive-from-liff", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    setTimeout(() => {
      liff.closeWindow();
    }, 300);
  }

  document.getElementById("appointmentForm").addEventListener("submit", submitForm);

  main();
</script>

</body>
</html>
