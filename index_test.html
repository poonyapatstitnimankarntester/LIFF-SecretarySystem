<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Secretary - Add Appointment</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, textarea, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 8px;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>เพิ่มนัดหมาย</h2>

<form id="appointmentForm">
  <input type="text" id="title" placeholder="ชื่อนัด" required />

  <input type="date" id="event_date" required />

  <input type="time" id="event_time" required />

  <input type="number" id="remind_before_days" placeholder="เตือนล่วงหน้ากี่วัน" value="0" min="0" />

  <textarea id="note" placeholder="หมายเหตุเพิ่มเติม"></textarea>

  <button type="submit">บันทึกนัดtest</button>
</form>

<script>
  const liffId = "2008859812-P8rNW4Tb"; // ใช้ของคุณ

  async function main() {
    await liff.init({ liffId });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const id = params.get("id");

    console.log("mode:", mode);
    console.log("id:", id);
    if (mode === "edit" && id) {
      await loadAppointment(id);
    }
  }
  async function loadAppointment(id) {
  const res = await fetch(`https://poonyameenoi.app.n8n.cloud/webhook-test/get-appointment?id=${id}`);
  const data = await res.json();

  // ใส่ค่าในฟอร์ม
  document.getElementById("title").value = data.title;
  document.getElementById("date").value = data.event_date.split("T")[0];
  document.getElementById("time").value = data.event_time;
  document.getElementById("note").value = data.note || "";
  } 
  async function submitForm(event) {
    event.preventDefault();

    const profile = await liff.getProfile();

    const payload = {
      action: "create_appointment",
      userId: profile.userId,
      displayName: profile.displayName,
      title: document.getElementById("title").value,
      event_date: document.getElementById("event_date").value,
      event_time: document.getElementById("event_time").value,
      remind_before_days: parseInt(document.getElementById("remind_before_days").value) || 0,
      note: document.getElementById("note").value,
      tags: []  // เตรียมไว้ future
    };

    await fetch("https://poonyameenoi.app.n8n.cloud/webhook-test/receive-from-liff", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    setTimeout(() => {
      liff.closeWindow();
    }, 300);
  }

  document.getElementById("appointmentForm").addEventListener("submit", submitForm);

  main();
</script>

</body>
</html>
